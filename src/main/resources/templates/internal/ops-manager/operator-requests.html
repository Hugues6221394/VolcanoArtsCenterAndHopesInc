<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/admin-base}">
<head><title>Tour Operator Requests</title></head>
<body>
<th:block layout:fragment="breadcrumb"><a th:href="@{/admin/dashboard}">Admin</a><span class="sep">›</span><span>Operator Requests</span></th:block>
<main layout:fragment="content">
    <div class="admin-page-header"><div class="admin-page-header__info"><h1>Tour Operator Requests</h1><p>Review and respond to tour operator partnership requests.</p></div></div>
    <div class="admin-card">
        <div class="admin-card__header"><h3>All Requests</h3><span class="chip chip--info" th:text="${#lists.size(items)} + ' total'">0</span></div>
        <div class="admin-card__body--flush"><div class="admin-table-wrap">
            <table class="admin-table"><thead><tr><th>Company</th><th>Contact</th><th>Experience</th><th>Date / Group</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
            <tr th:each="r : ${items}">
                <td><div class="cell-primary" th:text="${r.companyName}">Company</div><div style="font-size:.72rem;color:var(--color-gray-500);" th:text="${r.contactPerson}">Contact</div></td>
                <td class="cell-mono" th:text="${r.contactEmail}">email</td>
                <td th:text="${r.experience != null ? r.experience.title : '-'}">Exp</td>
                <td><span th:text="${r.requestedDate}">date</span> / <span th:text="${r.groupSize}">0</span> pax</td>
                <td><span class="chip" th:data-status="${r.status}" th:text="${r.status}">PENDING</span></td>
                <td>
                    <form th:action="@{|/admin/ops/operator-requests/${r.id}/status|}" method="post" style="display:flex;gap:.35rem;align-items:center;flex-wrap:wrap;">
                        <select class="form-select" name="status" style="min-width:110px;padding:.4rem;"><option th:each="s : ${T(com.volcanoartscenter.platform.shared.model.TourOperatorRequest.RequestStatus).values()}" th:value="${s}" th:text="${s}" th:selected="${s == r.status}">S</option></select>
                        <input class="form-input" name="partnerPrice" type="number" step="0.01" placeholder="Price" style="max-width:90px;padding:.4rem;" th:value="${r.partnerPrice}" />
                        <input class="form-input" name="adminNotes" placeholder="Note" style="max-width:110px;padding:.4rem;" />
                        <button class="btn btn--outline btn--xs" type="submit">Update</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(items)}"><td colspan="6" class="admin-empty"><div class="admin-empty__icon">🤝</div><div class="admin-empty__text">No operator requests</div></td></tr>
            </tbody></table>
        </div></div>
    </div>
</main>
</body>
</html>
