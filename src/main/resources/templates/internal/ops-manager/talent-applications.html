<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/admin-base}">
<head><title>Talent Applications</title></head>
<body>
<th:block layout:fragment="breadcrumb"><a th:href="@{/admin/dashboard}">Admin</a><span class="sep">›</span><span>Talent Applications</span></th:block>
<main layout:fragment="content">
    <div class="admin-page-header"><div class="admin-page-header__info"><h1>Talent Applications</h1><p>Review and manage talent program applications.</p></div></div>
    <div class="admin-card">
        <div class="admin-card__header"><h3>All Applications</h3><span class="chip chip--info" th:text="${#lists.size(items)} + ' total'">0</span></div>
        <div class="admin-card__body--flush"><div class="admin-table-wrap">
            <table class="admin-table"><thead><tr><th>Applicant</th><th>Category</th><th>Specialty</th><th>Experience</th><th>Status</th><th>Applied</th><th>Actions</th></tr></thead>
            <tbody>
            <tr th:each="a : ${items}">
                <td><div class="cell-primary" th:text="${a.fullName}">Name</div><div style="font-size:.72rem;color:var(--color-gray-500);" th:text="${a.email}">email</div></td>
                <td><span class="chip chip--primary" th:text="${a.applicantCategory}">CAT</span></td>
                <td th:text="${a.primarySpecialty ?: '-'}">-</td>
                <td th:text="${a.yearsOfExperience ?: '-'}">-</td>
                <td><span class="chip" th:data-status="${a.status}" th:text="${a.status}">PENDING</span></td>
                <td th:text="${a.createdAt}">2026-01-01</td>
                <td>
                    <form th:action="@{|/admin/ops/talent-applications/${a.id}/status|}" method="post" style="display:flex;gap:.35rem;align-items:center;">
                        <select class="form-select" name="status" style="min-width:120px;padding:.4rem;"><option th:each="s : ${T(com.volcanoartscenter.platform.shared.model.TalentApplication.ApplicationStatus).values()}" th:value="${s}" th:text="${s}" th:selected="${s == a.status}">S</option></select>
                        <input class="form-input" name="adminNotes" placeholder="Note" style="max-width:120px;padding:.4rem;" />
                        <button class="btn btn--outline btn--xs" type="submit">Update</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(items)}"><td colspan="7" class="admin-empty"><div class="admin-empty__icon">🎨</div><div class="admin-empty__text">No talent applications yet</div></td></tr>
            </tbody></table>
        </div></div>
    </div>
</main>
</body>
</html>
