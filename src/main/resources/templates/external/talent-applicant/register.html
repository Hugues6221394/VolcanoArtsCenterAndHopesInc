<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Talent Applicant Registration</title>
</head>
<body>
<main layout:fragment="content">
    <section class="section">
        <div class="container" style="max-width:760px;">
            <h1>Create Talent Applicant Account</h1>
            <div th:if="${successMessage}" style="background: rgba(46,125,50,0.16); border: 1px solid rgba(46,125,50,0.35); border-radius: var(--radius-md); color: #A5D6A7; padding: 1rem; margin: 1rem 0;" th:text="${successMessage}"></div>
            <form th:action="@{/talent/register}" method="post" style="background: var(--gradient-card); border:1px solid rgba(255,255,255,.08); border-radius:var(--radius-lg); padding:1.5rem; display:grid; gap:.8rem; grid-template-columns:repeat(2,minmax(0,1fr));">
                <div class="form-group"><label class="form-label">First Name</label><input class="form-input" name="firstName" required/></div>
                <div class="form-group"><label class="form-label">Last Name</label><input class="form-input" name="lastName" required/></div>
                <div class="form-group"><label class="form-label">Email</label><input class="form-input" name="email" type="email" required/></div>
                <div class="form-group"><label class="form-label">Phone</label><input class="form-input" name="phone"/></div>
                <div class="form-group"><label class="form-label">Country / Location</label><input class="form-input" name="country"/></div>
                <div class="form-group"><label class="form-label">Password</label><input class="form-input" name="password" type="password" minlength="8" required/></div>
                <button class="btn btn--primary" type="submit" style="grid-column:1 / -1;">Create Account</button>
            </form>
        </div>
    </section>
</main>
</body>
</html>
