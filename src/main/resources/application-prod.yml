# ── Production overrides ──
# Activated with SPRING_PROFILES_ACTIVE=prod (Railway sets this in the service env).
# Anything not specified here inherits from application.yml.

spring:
  thymeleaf:
    cache: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  web:
    resources:
      cache:
        period: 30d
        cachecontrol:
          max-age: 30d
          must-revalidate: true

  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: 10000
      idle-timeout: 600000
      max-lifetime: 1800000

  session:
    timeout: 30m
    redis:
      flush-mode: on_save

server:
  port: ${PORT:8080}
  forward-headers-strategy: native
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
  servlet:
    session:
      cookie:
        secure: true
        http-only: true
        same-site: lax
  shutdown: graceful
  compression:
    enabled: true
    mime-types: text/html,text/css,application/javascript,application/json,image/svg+xml
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
    prometheus:
      access: read_only
  metrics:
    tags:
      application: volcano-platform
      environment: prod

logging:
  level:
    root: INFO
    com.volcanoartscenter: INFO
    org.springframework.web: WARN
    org.hibernate: WARN

platform:
  notifications:
    email:
      enabled: ${EMAIL_NOTIFICATIONS_ENABLED:true}
    whatsapp:
      enabled: ${WHATSAPP_NOTIFICATIONS_ENABLED:false}
    sms:
      enabled: ${SMS_NOTIFICATIONS_ENABLED:false}
    retry:
      enabled: true
